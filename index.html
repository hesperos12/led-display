<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LED Displays ❤️</title>

<style>
body{
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family: Arial, sans-serif;
    text-align:center;
    color:white;
}

.container{
    margin-top:50px;
    max-width: 500px;
    margin-left:auto;
    margin-right:auto;
    background: rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

input,button{
    font-size:18px;
    padding:8px;
    margin:10px;
    border-radius:10px;
    border:none;
}

button{
    background:#ff4d6d;
    color:white;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#ff1e4d;
}

.slider{
    width:250px;
}

.status{
    margin-top:20px;
    background: rgba(255,255,255,0.2);
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>❤️ Nachricht an Stian ❤️</h1>

<!-- Nachricht -->
<input id="msg" placeholder="Deine Nachricht">

<br>

<!-- Helligkeit -->
<label>Helligkeit</label><br>
<input class="slider" type="range" min="1" max="15" value="5" id="brightness">

<br>

<!-- Buttons -->
<button onclick="sendMessage()">Senden</button>
<br>
<button onclick="displayOn()">Display AN</button>
<button onclick="displayOff()">Display AUS</button>

<!-- Statusanzeige -->
<div class="status">
<h3>Status</h3>
<p>Aktueller Text: <span id="statusText">-</span></p>
<p>Helligkeit: <span id="statusBrightness">-</span></p>
<p>LED: <span id="statusOn">-</span></p>
</div>

<h1>❤️ Nachricht an Lea ❤️</h1>

<!-- Nachricht -->
<input id="msg_lea" placeholder="Deine Nachricht">

<br>

<!-- Helligkeit -->
<label>Helligkeit</label><br>
<input class="slider" type="range" min="1" max="15" value="5" id="brightness_lea">

<br>

<!-- Buttons -->
<button onclick="sendMessage_lea()">Senden an Lea</button>
<br>
<button onclick="displayOn_lea()">Display von Lea AN</button>
<button onclick="displayOff_lea()">Display von Lea AUS</button>

<!-- Statusanzeige -->
<div class="status">
<h3>Status</h3>
<p>Aktueller Text: <span id="statusText_lea">-</span></p>
<p>Helligkeit: <span id="statusBrightness_lea">-</span></p>
<p>LED: <span id="statusOn_lea">-</span></p>
</div>
</div>

<script>
// Firebase URL
const firebaseURL = "https://lea-led-display-default-rtdb.firebaseio.com/display.json";

// Nachricht senden
function sendMessage(){
    let message = document.getElementById("msg").value;
    let brightness = document.getElementById("brightness").value;

    fetch(firebaseURL,{
        method:"PATCH",
        body:JSON.stringify({
            message: message,
            brightness: parseInt(brightness),
            on: true
        })
    });
}

function sendMessage_lea(){
    let message_lea = document.getElementById("msg_lea").value;
    let brightness_lea = document.getElementById("brightness_lea").value;

    fetch(firebaseURL,{
        method:"PATCH",
        body:JSON.stringify({
            message_lea: message_lea,
            brightness_lea: parseInt(brightness_lea),
            on_lea: true
        })
    });
}

// Display AN
function displayOn(){
    fetch(firebaseURL,{
        method:"PATCH",
        body:JSON.stringify({on:true})
    });
}

// Display AUS
function displayOff(){
    fetch(firebaseURL,{
        method:"PATCH",
        body:JSON.stringify({on:false})
    });
}

function displayOn_lea(){
    fetch(firebaseURL,{
        method:"PATCH",
        body:JSON.stringify({on_lea:true})
    });
}

// Display AUS
function displayOff_lea(){
    fetch(firebaseURL,{
        method:"PATCH",
        body:JSON.stringify({on_lea:false})
    });
}

// Status von Firebase abrufen und Anzeige aktualisieren
function updateStatus(){
    fetch(firebaseURL)
    .then(response => response.json())
    .then(data => {
        if(data){
            document.getElementById("statusText").innerText = data.message || "-";
            document.getElementById("statusBrightness").innerText = data.brightness || "-";
            document.getElementById("statusOn").innerText = data.on ? "AN" : "AUS";
            document.getElementById("statusText_lea").innerText = data.message_lea || "-";
            document.getElementById("statusBrightness_lea").innerText = data.brightness_lea || "-";
            document.getElementById("statusOn_lea").innerText = data.on_lea ? "AN" : "AUS";

            // Slider auf aktuelle Helligkeit setzen
            if(data.brightness) document.getElementById("brightness").value = data.brightness;
            if(data.brightness_lea) document.getElementById("brightness_lea").value = data.brightness_lea;
        }
    });
}

// Status alle 2 Sekunden aktualisieren
setInterval(updateStatus, 5000);

// Initial laden
updateStatus();

</script>

</body>
</html>
